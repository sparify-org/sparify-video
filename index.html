<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sparify</title>

  <style>
    :root{
      --accent:#00B1B7;
      --accent2:#2FD6D9;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(900px 600px at 50% 20%, rgba(0,177,183,.25), transparent 60%),
        linear-gradient(180deg, #F3FFFE, #FFFFFF);
      font-family:sans-serif;
      overflow:hidden;
    }

    .container{
      position:relative;
    }

    .video-wrapper{
      width:min(90vw, 420px);
      aspect-ratio:9/16;
      border-radius:28px;
      overflow:hidden;
      box-shadow: 0 25px 60px rgba(0,177,183,.25);
      background:#000;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .sound-btn{
      position:absolute;
      bottom:16px;
      right:16px;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(10px);
      border:1px solid rgba(0,177,183,.3);
      color:#00B1B7;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      transition:all .2s ease;
    }

    .sound-btn:hover{
      background:#00B1B7;
      color:#fff;
    }

    @media (max-width:600px){
      .video-wrapper{
        width:92vw;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="video-wrapper">
      <video id="video" autoplay muted loop playsinline preload="metadata">
        <source src="https://bejlqwebcujfklavoecm.supabase.co/storage/v1/object/public/video/reel.mp4" type="video/mp4">
      </video>
    </div>

    <button class="sound-btn" onclick="toggleSound()" id="soundBtn">
      🔊 Ton
    </button>
  </div>

  <script>
    const video = document.getElementById("video");
    const btn = document.getElementById("soundBtn");

    function toggleSound(){
      video.muted = !video.muted;

      if(!video.muted){
        video.play();
        btn.textContent = "🔇 Stumm";
      } else {
        btn.textContent = "🔊 Ton";
      }
    }
  </script>

</body>
</html>
