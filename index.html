<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sparify</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#00B1B7;
      --accent2:#2FD6D9;
      --bgA:#F3FFFE;
      --bgB:#FFFFFF;
      --text:#062022;
      --muted: rgba(6,32,34,.65);
      --border: rgba(7,32,34,.10);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Montserrat",sans-serif;
      color:var(--text);
      background:
        radial-gradient(800px 500px at 20% 10%, rgba(0,177,183,.18), transparent 55%),
        linear-gradient(180deg, var(--bgA), var(--bgB));
    }

    header{
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter: blur(10px);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
    }

    .logo-circle{
      width:38px;
      height:38px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-circle img{
      width:24px;
    }

    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      max-width:1100px;
      margin:40px auto;
      padding:20px;
      align-items:center;
    }

    h1{
      font-size:42px;
      line-height:1.1;
      margin-bottom:15px;
    }

    .accent{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      color:transparent;
    }

    p{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:20px;
    }

    .btn{
      padding:12px 18px;
      border-radius:14px;
      font-weight:700;
      text-decoration:none;
      display:inline-block;
      margin-right:10px;
    }

    .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .secondary{
      border:1px solid var(--accent);
      color:var(--accent);
    }

    .video-card{
      border-radius:24px;
      padding:15px;
      background:#fff;
      box-shadow:0 18px 45px rgba(0,0,0,.1);
      border:1px solid var(--border);
    }

    .video-wrapper{
      aspect-ratio:9/16;
      border-radius:20px;
      overflow:hidden;
      background:#000;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .sound-btn{
      margin-top:10px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--accent);
      background:rgba(0,177,183,.1);
      color:var(--accent);
      font-weight:700;
      cursor:pointer;
    }

    footer{
      text-align:center;
      margin:60px 0 20px;
      font-size:13px;
      color:rgba(6,32,34,.5);
    }

    @media(max-width:900px){
      .hero{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-circle">
      <img src="https://i.ibb.co/8LJSQN4f/LOGO-white-transparent-bg.png" alt="logo">
    </div>
    Sparify
  </div>
</header>

<section class="hero">
  <div>
    <h1> <span class="accent">Landing</span><br>mit Reels Video</h1>
    <p></p>
    <a href="#" class="btn primary">Jetzt starten</a>
    <a href="#" class="btn secondary">Mehr erfahren</a>
  </div>

  <div class="video-card">
    <div class="video-wrapper">
      <video id="reel" autoplay muted loop playsinline>
        <source src="assets/video/reel.mp4" type="video/mp4">
      </video>
    </div>
    <button class="sound-btn" onclick="toggleSound()">🔈 Ton</button>
  </div>
</section>

<footer>
  © <span id="year"></span> Sparify
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();

  function toggleSound(){
    const video = document.getElementById("reel");
    video.muted = !video.muted;
  }
</script>

</body>
</html>
